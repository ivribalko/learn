name: Publish Production Containers

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: production-container
  cancel-in-progress: false

env:
  SITE_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/learn-site
  SYNC_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/learn-sync

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate site image metadata
        id: site_metadata
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.SITE_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha
          labels: |
            org.opencontainers.image.description=Production Learn website and course runner
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
      - name: Build and push site image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.site_metadata.outputs.tags }}
          labels: ${{ steps.site_metadata.outputs.labels }}
          cache-from: type=gha,scope=site
          cache-to: type=gha,mode=max,scope=site
      - name: Generate sync image metadata
        id: sync_metadata
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.SYNC_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha
          labels: |
            org.opencontainers.image.description=Learn course repository synchronization worker
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
      - name: Build and push sync image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile.sync
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.sync_metadata.outputs.tags }}
          labels: ${{ steps.sync_metadata.outputs.labels }}
          cache-from: type=gha,scope=sync
          cache-to: type=gha,mode=max,scope=sync
